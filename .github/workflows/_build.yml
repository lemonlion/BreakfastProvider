name: Build

on:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET v10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set nuget.config credentials
        run: |
          cp nuget.config.github nuget.config
          sed -i "s|GITHUB_NUGET_APIKEY|${{ secrets.ORGANISATION_PAT }}|g" nuget.config

      - name: Create output folders
        run: mkdir -p ./output/publish-api

      - name: Build (dotnet build)
        run: >
          dotnet build
          -c Release
          -p:WarningLevel=0
          BreakfastProvider.sln

      - name: Scan for vulnerable packages
        run: |
          dotnet list package --vulnerable 2>&1 | tee vulnerable-packages.log
          if grep -q "has the following vulnerable packages" vulnerable-packages.log; then
            echo "::error::Vulnerable packages detected"
            exit 1
          fi

      - name: Upload scan results artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: vulnerable-packages.log
          path: ./vulnerable-packages.log
          retention-days: 1

      - name: Build API (dotnet publish)
        run: >
          dotnet publish
          -c Release
          -o ./output/publish-api
          -p:WarningLevel=0
          ./src/BreakfastProvider.Api/BreakfastProvider.Api.csproj


