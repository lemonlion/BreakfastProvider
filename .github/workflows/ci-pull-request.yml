name: 'CI: Pull request'
run-name: "${{ github.event.pull_request.title }}"

on:
  workflow_dispatch:

  pull_request:

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    uses: ./.github/workflows/_build.yml
    secrets: inherit


  # ─── LightBDD ───────────────────────────────────────────────────────────────

  lightbdd-in-memory:
    name: LightBDD in memory
    uses: ./.github/workflows/_tests.yml
    with:
      test-type: component
      test-run-type: memory
      test-run-description: lightbdd-in-memory
      csproj-path: ./tests/BreakfastProvider.Tests.Component.LightBDD/BreakfastProvider.Tests.Component.LightBDD.csproj
      features-report-path: tests/BreakfastProvider.Tests.Component.LightBDD/bin/Debug/net10.0/Reports/TestRunReport.html
    secrets: inherit

  lightbdd-in-memory-report:
    name: LightBDD in memory report
    needs: [lightbdd-in-memory]
    uses: ./.github/workflows/_report-tests.yml
    with:
      test-type: component
      test-run-type: memory
      trx-file: lightbdd-in-memory-results.trx

  lightbdd-in-memory-coverage:
    name: LightBDD in memory coverage
    needs: [lightbdd-in-memory]
    uses: ./.github/workflows/_report-coverage.yml
    with:
      test-type: component
      test-run-type: memory
      coverage-file: lightbdd-in-memory.coverage.cobertura.xml


  lightbdd-in-docker:
    name: LightBDD in docker
    uses: ./.github/workflows/_tests.yml
    with:
      test-type: component
      test-run-type: docker
      test-run-description: lightbdd-in-docker
      csproj-path: ./tests/BreakfastProvider.Tests.Component.LightBDD/BreakfastProvider.Tests.Component.LightBDD.csproj
      features-report-path: tests/BreakfastProvider.Tests.Component.LightBDD/bin/Debug/net10.0/Reports/TestRunReport.html
    secrets: inherit

  lightbdd-in-docker-report:
    name: LightBDD in docker report
    needs: [lightbdd-in-docker]
    uses: ./.github/workflows/_report-tests.yml
    with:
      test-type: component
      test-run-type: docker
      trx-file: lightbdd-in-docker-results.trx

  lightbdd-in-docker-coverage:
    name: LightBDD in docker coverage
    needs: [lightbdd-in-docker]
    uses: ./.github/workflows/_report-coverage.yml
    with:
      test-type: component
      test-run-type: docker
      coverage-file: lightbdd-in-docker.coverage.cobertura.xml


  lightbdd-external-sut:
    name: LightBDD external SUT
    uses: ./.github/workflows/_tests.yml
    with:
      test-type: component
      test-run-type: external-sut
      test-run-description: lightbdd-external-sut
      csproj-path: ./tests/BreakfastProvider.Tests.Component.LightBDD/BreakfastProvider.Tests.Component.LightBDD.csproj
      features-report-path: tests/BreakfastProvider.Tests.Component.LightBDD/bin/Debug/net10.0/Reports/TestRunReport.html
    secrets: inherit

  lightbdd-external-sut-report:
    name: LightBDD external SUT report
    needs: [lightbdd-external-sut]
    uses: ./.github/workflows/_report-tests.yml
    with:
      test-type: component
      test-run-type: external-sut
      trx-file: lightbdd-external-sut-results.trx

  lightbdd-external-sut-coverage:
    name: LightBDD external SUT coverage
    needs: [lightbdd-external-sut]
    uses: ./.github/workflows/_report-coverage.yml
    with:
      test-type: component
      test-run-type: external-sut
      coverage-file: lightbdd-external-sut.coverage.cobertura.xml


  # ─── ReqNRoll ───────────────────────────────────────────────────────────────

  reqnroll-in-memory:
    name: ReqNRoll in memory
    uses: ./.github/workflows/_tests.yml
    with:
      test-type: component
      test-run-type: memory
      test-run-description: reqnroll-in-memory
      csproj-path: ./tests/BreakfastProvider.Tests.Component.ReqNRoll/BreakfastProvider.Tests.Component.ReqNRoll.csproj
      features-report-path: tests/BreakfastProvider.Tests.Component.ReqNRoll/bin/Debug/net10.0/Reports/TestRunReport.html
    secrets: inherit

  reqnroll-in-memory-report:
    name: ReqNRoll in memory report
    needs: [reqnroll-in-memory]
    uses: ./.github/workflows/_report-tests.yml
    with:
      test-type: component
      test-run-type: memory
      trx-file: reqnroll-in-memory-results.trx

  reqnroll-in-memory-coverage:
    name: ReqNRoll in memory coverage
    needs: [reqnroll-in-memory]
    uses: ./.github/workflows/_report-coverage.yml
    with:
      test-type: component
      test-run-type: memory
      coverage-file: reqnroll-in-memory.coverage.cobertura.xml


  reqnroll-in-docker:
    name: ReqNRoll in docker
    uses: ./.github/workflows/_tests.yml
    with:
      test-type: component
      test-run-type: docker
      test-run-description: reqnroll-in-docker
      csproj-path: ./tests/BreakfastProvider.Tests.Component.ReqNRoll/BreakfastProvider.Tests.Component.ReqNRoll.csproj
      features-report-path: tests/BreakfastProvider.Tests.Component.ReqNRoll/bin/Debug/net10.0/Reports/TestRunReport.html
    secrets: inherit

  reqnroll-in-docker-report:
    name: ReqNRoll in docker report
    needs: [reqnroll-in-docker]
    uses: ./.github/workflows/_report-tests.yml
    with:
      test-type: component
      test-run-type: docker
      trx-file: reqnroll-in-docker-results.trx

  reqnroll-in-docker-coverage:
    name: ReqNRoll in docker coverage
    needs: [reqnroll-in-docker]
    uses: ./.github/workflows/_report-coverage.yml
    with:
      test-type: component
      test-run-type: docker
      coverage-file: reqnroll-in-docker.coverage.cobertura.xml


  reqnroll-external-sut:
    name: ReqNRoll external SUT
    uses: ./.github/workflows/_tests.yml
    with:
      test-type: component
      test-run-type: external-sut
      test-run-description: reqnroll-external-sut
      csproj-path: ./tests/BreakfastProvider.Tests.Component.ReqNRoll/BreakfastProvider.Tests.Component.ReqNRoll.csproj
      features-report-path: tests/BreakfastProvider.Tests.Component.ReqNRoll/bin/Debug/net10.0/Reports/TestRunReport.html
    secrets: inherit

  reqnroll-external-sut-report:
    name: ReqNRoll external SUT report
    needs: [reqnroll-external-sut]
    uses: ./.github/workflows/_report-tests.yml
    with:
      test-type: component
      test-run-type: external-sut
      trx-file: reqnroll-external-sut-results.trx

  reqnroll-external-sut-coverage:
    name: ReqNRoll external SUT coverage
    needs: [reqnroll-external-sut]
    uses: ./.github/workflows/_report-coverage.yml
    with:
      test-type: component
      test-run-type: external-sut
      coverage-file: reqnroll-external-sut.coverage.cobertura.xml


  # ─── xUnit ─────────────────────────────────────────────────────────────────

  xunit-in-memory:
    name: xUnit in memory
    uses: ./.github/workflows/_tests.yml
    with:
      test-type: component
      test-run-type: memory
      test-run-description: xunit-in-memory
      csproj-path: ./tests/BreakfastProvider.Tests.Component.xUnit/BreakfastProvider.Tests.Component.xUnit.csproj
      features-report-path: tests/BreakfastProvider.Tests.Component.xUnit/bin/Debug/net10.0/Reports/TestRunReport.html
    secrets: inherit

  xunit-in-memory-report:
    name: xUnit in memory report
    needs: [xunit-in-memory]
    uses: ./.github/workflows/_report-tests.yml
    with:
      test-type: component
      test-run-type: memory
      trx-file: xunit-in-memory-results.trx

  xunit-in-memory-coverage:
    name: xUnit in memory coverage
    needs: [xunit-in-memory]
    uses: ./.github/workflows/_report-coverage.yml
    with:
      test-type: component
      test-run-type: memory
      coverage-file: xunit-in-memory.coverage.cobertura.xml


  xunit-in-docker:
    name: xUnit in docker
    uses: ./.github/workflows/_tests.yml
    with:
      test-type: component
      test-run-type: docker
      test-run-description: xunit-in-docker
      csproj-path: ./tests/BreakfastProvider.Tests.Component.xUnit/BreakfastProvider.Tests.Component.xUnit.csproj
      features-report-path: tests/BreakfastProvider.Tests.Component.xUnit/bin/Debug/net10.0/Reports/TestRunReport.html
    secrets: inherit

  xunit-in-docker-report:
    name: xUnit in docker report
    needs: [xunit-in-docker]
    uses: ./.github/workflows/_report-tests.yml
    with:
      test-type: component
      test-run-type: docker
      trx-file: xunit-in-docker-results.trx

  xunit-in-docker-coverage:
    name: xUnit in docker coverage
    needs: [xunit-in-docker]
    uses: ./.github/workflows/_report-coverage.yml
    with:
      test-type: component
      test-run-type: docker
      coverage-file: xunit-in-docker.coverage.cobertura.xml


  xunit-external-sut:
    name: xUnit external SUT
    uses: ./.github/workflows/_tests.yml
    with:
      test-type: component
      test-run-type: external-sut
      test-run-description: xunit-external-sut
      csproj-path: ./tests/BreakfastProvider.Tests.Component.xUnit/BreakfastProvider.Tests.Component.xUnit.csproj
      features-report-path: tests/BreakfastProvider.Tests.Component.xUnit/bin/Debug/net10.0/Reports/TestRunReport.html
    secrets: inherit

  xunit-external-sut-report:
    name: xUnit external SUT report
    needs: [xunit-external-sut]
    uses: ./.github/workflows/_report-tests.yml
    with:
      test-type: component
      test-run-type: external-sut
      trx-file: xunit-external-sut-results.trx

  xunit-external-sut-coverage:
    name: xUnit external SUT coverage
    needs: [xunit-external-sut]
    uses: ./.github/workflows/_report-coverage.yml
    with:
      test-type: component
      test-run-type: external-sut
      coverage-file: xunit-external-sut.coverage.cobertura.xml


  # ─── Gate ───────────────────────────────────────────────────────────────────

  checks-complete:
    name: Checks complete
    needs:
      - build
      - lightbdd-in-memory
      - lightbdd-in-docker
      - lightbdd-external-sut
      - reqnroll-in-memory
      - reqnroll-in-docker
      - reqnroll-external-sut
      - xunit-in-memory
      - xunit-in-docker
      - xunit-external-sut
    runs-on: ubuntu-24.04
    steps:
      - name: Checks complete
        run: echo "Checks complete"
