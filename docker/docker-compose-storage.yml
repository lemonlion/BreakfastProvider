networks:
  localdev:
    driver: bridge

services:
  storage:
    container_name: docker-azurite
    image: mcr.microsoft.com/azure-storage/azurite
    hostname: storage.local
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck
    ports:
      - '10000:10000'
      - '10001:10001'
      - '10002:10002'
    networks:
      - localdev
