networks:
  localdev:
    driver: bridge

services:
  storage:
    container_name: docker-azurite
    image: mcr.microsoft.com/azure-storage/azurite
    hostname: storage.local
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck --disableProductStyleUrl
    ports:
      - '10000:10000'
      - '10001:10001'
      - '10002:10002'
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 10000 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - localdev
