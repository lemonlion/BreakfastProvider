networks:
  localdev:
    driver: bridge
  kafkanet:
    name: kafka-network

services:

  breakfast-provider-api:
    build:
      context: ..
      dockerfile: ./src/BreakfastProvider.Api/Dockerfile
    container_name: docker.breakfast-provider-api
    restart: on-failure:5
    ports:
      - "5080:8080"
    depends_on:
      cosmosdb:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
      spanner-init:
        condition: service_completed_successfully
      pubsub-init:
        condition: service_completed_successfully
      eventhub-emulator:
        condition: service_started
      cow-service:
        condition: service_started
      goat-service:
        condition: service_started
      supplier-service:
        condition: service_started
      kitchen-service:
        condition: service_started
      notification-service:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__Http__Url=http://+:8080
      - Kestrel__Endpoints__Http__Protocols=Http1AndHttp2
      - DOTNET_EnableDiagnostics=0
      - CowServiceConfig__BaseAddress=http://cow-service:8080
      - GoatServiceConfig__BaseAddress=http://goat-service:8080
      - SupplierServiceConfig__BaseAddress=http://supplier-service:8080
      - KitchenServiceConfig__BaseAddress=http://kitchen-service:8080
      - CosmosConfig__ConnectionString=AccountEndpoint=https://cosmosdb-database.local:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      - CosmosConfig__UseGatewayMode=true
      - CosmosConfig__RequestTimeoutSeconds=60
      - EventGridConfig__Endpoint=https://eventgrid.local:60101/api/events
      - EventGridConfig__TopicKey=TheLocal+DevelopmentKey=
      - KafkaConfig__BootstrapServers=kafka.local:9092
      - KafkaConfig__ProducerConfigurations__RecipeLogEvent__TopicName=breakfast_recipe_logs
      - KafkaConfig__ProducerConfigurations__RecipeLogEvent__ApiKey=kafka-user
      - KafkaConfig__ProducerConfigurations__RecipeLogEvent__ApiSecret=kafka-user-secret
      - KafkaConfig__ConsumerConfigurations__RecipeLogEvent__TopicName=breakfast_recipe_logs
      - KafkaConfig__ConsumerConfigurations__RecipeLogEvent__ApiKey=kafka-user
      - KafkaConfig__ConsumerConfigurations__RecipeLogEvent__ApiSecret=kafka-user-secret
      - KafkaConfig__SslCaLocation=/certs/kafka-ca.crt
      - FeatureSwitchesConfig__IsGoatMilkEnabled=true
      - ReportingConfig__ConnectionString=Server=sqlserver-database.local,1433;Database=BreakfastReporting;User Id=sa;Password=YourStr0ngP@ssword;TrustServerCertificate=True
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger.local:4317
      - PubSubConfig__ProjectId=breakfast-provider-project
      - PUBSUB_EMULATOR_HOST=pubsub-emulator.local:8085
      - PubSubConfig__SubscriberConfigurations__PancakeBatchCompletedEvent__SubscriptionId=pancake-batch-completed-sub
      - SPANNER_EMULATOR_HOST=spanner-emulator.local:9010
      - SpannerConfig__ProjectId=breakfast-provider-project
      - SpannerConfig__InstanceId=breakfast-instance
      - SpannerConfig__DatabaseId=breakfast-db
      - NotificationServiceConfig__BaseAddress=http://notification-service:8080
      - EventHubConfig__ConnectionString=Endpoint=sb://eventhub-emulator.local;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      - EventHubConfig__EventHubName=breakfast-equipment-alerts
      - EventHubConfig__ConsumerGroup=$$Default
      - EventHubConfig__BlobStorageConnectionString=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://storage.local:10000/devstoreaccount1;
      - EventHubConfig__BlobContainerName=eventhub-checkpoints
      - DatabaseConfig__ConnectionString=Server=sqlserver-database.local,1433;Database=BreakfastProvider;User Id=sa;Password=YourStr0ngP@ssword;TrustServerCertificate=True
    volumes:
      - ./kafka-config/certificates/ca.crt:/certs/kafka-ca.crt:ro
      - ./docker-entrypoint.sh:/app/docker-entrypoint.sh:ro
    user: root
    entrypoint: ["/bin/sh", "/app/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      localdev:
      kafkanet:
        aliases:
          - breakfast-provider-api.local
